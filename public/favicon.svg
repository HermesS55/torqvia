<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring track -->
  <circle cx="32" cy="32" r="28" stroke="#27272a" stroke-width="6"/>
  <!-- Orange arc (gauge 210° to 330°) -->
  <path d="M 7.93 45 A 28 28 0 1 1 56.07 45" stroke="url(#g)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="5" fill="#f97316"/>
  <circle cx="32" cy="32" r="2" fill="white"/>
  <!-- Needle (pointing ~45° from center, upper-right) -->
  <line x1="32" y1="32" x2="48" y2="12" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <defs>
    <linearGradient id="g" x1="8" y1="45" x2="56" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
</svg>
